<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>CashCast</title>
<style>
/* ============================================================
   CashCast — single-file personal finance forecasting
   Sections: tokens, base, layout, ribbons, cards, calendar,
   sheets, spreadsheet, utilities, motion
   ============================================================ */

/* ---- design tokens ---- */
:root{
  --bg:#0e1116;
  --bg-soft:#121821;
  --surface:#161d27;
  --surface-2:#1b2531;
  --surface-3:#212d3b;
  --line:#28333f;
  --line-soft:#1f2935;
  --text:#e8eef5;
  --text-dim:#9fb0c0;
  --text-faint:#6c7c8c;
  --pos:#3ddc97;     /* income / positive */
  --pos-dim:#1f7a57;
  --neg:#ff7a72;     /* expense / negative */
  --neg-dim:#8a3b3b;
  --gold:#f5c451;    /* forecast */
  --blue:#5b9dff;    /* info */
  --accent:#3ddc97;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:18px;
  --radius-sm:12px;
  --tap:48px;
  --maxw:480px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 50% -10%, #16202c 0%, transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ---- app shell ---- */
#app{max-width:var(--maxw);margin:0 auto;min-height:100vh;position:relative}
.app-pad{padding:0 14px calc(96px + var(--safe-b))}

/* header */
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 14px 10px;
  background:linear-gradient(180deg, var(--bg) 60%, transparent);
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.3px}
.brand .logo{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(140deg,var(--pos),#2f8efc);
  display:grid;place-items:center;color:#06131a;font-weight:800;font-size:16px;
  box-shadow:0 4px 14px rgba(61,220,151,.35);
}
.brand .name{font-size:19px}
.brand .name span{color:var(--text-dim);font-weight:600}
.icon-btn{
  width:var(--tap);height:42px;min-width:42px;border-radius:12px;
  display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);
  color:var(--text-dim);transition:transform .12s ease,background .2s;
}
.icon-btn:active{transform:scale(.92);background:var(--surface-2)}
.icon-btn svg{width:20px;height:20px}
.icon-btn.active{color:var(--pos);border-color:rgba(61,220,151,.4);background:var(--surface-2)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.brand{cursor:pointer}

/* ============== Today Ribbon ============== */
.ribbon{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  margin-top:6px;overflow:hidden;position:relative;
}
.today-ribbon{margin-bottom:12px}
.today-ribbon.is-today{
  border-color:rgba(61,220,151,.4);
  background:
    repeating-linear-gradient(45deg, rgba(61,220,151,.045) 0 8px, transparent 8px 16px),
    linear-gradient(180deg, rgba(61,220,151,.10), transparent 55%),
    var(--surface);
  box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(61,220,151,.12);
}
.tr-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 6px;
}
.date-btn{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 8px;border-radius:12px;
  background:var(--surface-2);border:1px solid var(--line);
  transition:transform .12s ease,background .2s;
}
.date-btn:active{transform:scale(.96)}
.date-btn .cal-ico{width:18px;height:18px;color:var(--text-dim)}
.date-btn .d-main{font-weight:700;font-size:15px}
.date-btn .d-sub{font-size:11px;color:var(--text-dim);font-weight:600}
.date-btn .chev{width:14px;height:14px;color:var(--text-faint)}
.today-badge{
  display:none;align-items:center;justify-content:center;gap:5px;
  font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:#06131a;background:linear-gradient(120deg,var(--pos),#7ef0bf);
  height:34px;padding:0 12px;border-radius:10px;box-shadow:0 4px 12px rgba(61,220,151,.4);
}
.is-today .today-badge{display:inline-flex}
.nav-arrows{display:flex;gap:6px;align-items:center}
.nav-arrows button{
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);
}
.nav-arrows button:active{transform:scale(.9)}
.nav-arrows svg{width:16px;height:16px}

.tr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line-soft);
  border-top:1px solid var(--line-soft);margin-top:6px}
.field{
  background:var(--surface);padding:11px 12px 12px;position:relative;
  transition:background .2s;
}
.field:focus-within{background:var(--surface-2)}
.field .lbl{font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.field .dot{width:6px;height:6px;border-radius:50%}
.field input{
  width:100%;border:none;background:transparent;outline:none;
  font-size:18px;font-weight:700;padding:0;letter-spacing:-.2px;
}
.field .pfx{color:var(--text-faint);font-weight:600}
.field.bank input{color:var(--text)}
.field.income input{color:var(--pos)}
.field.expense input{color:var(--neg)}
.field input::placeholder{color:var(--text-faint);font-weight:600}
.note-field{
  background:var(--surface);padding:10px 14px 12px;border-top:1px solid var(--line-soft);
}
.note-field .lbl{font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);margin-bottom:3px}
.note-field input{width:100%;border:none;background:transparent;outline:none;font-size:14.5px;font-weight:500;color:var(--text-dim)}
.note-field input::placeholder{color:var(--text-faint)}

/* ============== Forecast Ribbon ============== */
.forecast-ribbon{margin-bottom:14px}
.fr-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft)}
.metric{
  background:var(--surface);padding:13px 14px;text-align:left;position:relative;
  display:flex;flex-direction:column;gap:3px;transition:background .15s;
}
.metric:active{background:var(--surface-2)}
.metric .m-lbl{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--text-dim);display:flex;align-items:center;gap:6px;justify-content:space-between}
.metric .m-lbl .i{width:15px;height:15px;color:var(--text-faint)}
.metric .m-val{font-size:21px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.metric .m-sub{font-size:11px;color:var(--text-faint);font-weight:600}
.metric.pos .m-val{color:var(--pos)}
.metric.gold .m-val{color:var(--gold)}
.metric.neg .m-val{color:var(--neg)}
.metric .spark{position:absolute;right:10px;bottom:8px;opacity:.5}

/* detail panel under forecast */
.detail{overflow:hidden;height:0}
.detail-inner{
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);
  margin:0 0 14px;padding:14px;
}
.detail-title{font-size:13px;font-weight:800;letter-spacing:.3px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.detail-desc{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:12px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px dashed var(--line)}
.calc-row:first-of-type{border-top:none}
.calc-row .k{font-size:12.5px;color:var(--text-dim)}
.calc-row .v{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
.calc-row.total{border-top:1px solid var(--line);margin-top:4px;padding-top:9px}
.calc-row.total .k{color:var(--text);font-weight:700}
.calc-row.total .v{font-size:16px}

.edit-list{margin-top:4px}
.edit-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:7px 0;border-top:1px dashed var(--line)}
.edit-row .er-date{font-size:11.5px;color:var(--text-faint);font-weight:600;min-width:54px}
.edit-row .er-note{font-size:12.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-row input{
  text-align:right;border:1px solid var(--line);background:var(--surface);
  border-radius:9px;padding:7px 9px;font-size:14px;font-weight:700;width:96px;outline:none;
}
.edit-row input:focus{border-color:var(--accent)}
.edit-empty{font-size:12.5px;color:var(--text-faint);text-align:center;padding:14px 0}

/* ============== Cards / visualizations ============== */
.section-label{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);margin:18px 4px 10px}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 16px 14px;margin-bottom:14px;box-shadow:var(--shadow);
}
.card-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.card-title{font-size:15px;font-weight:800;letter-spacing:-.2px}
.card-hint{font-size:11.5px;color:var(--text-faint);font-weight:600}
.card-sub{font-size:12.5px;color:var(--text-dim);margin-bottom:12px}

.legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.legend .li{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-dim);font-weight:600}
.legend .swatch{width:18px;height:3px;border-radius:2px}
.legend .swatch.dash{background:repeating-linear-gradient(90deg,var(--gold) 0 5px,transparent 5px 9px);height:3px}

.chart-wrap{width:100%;position:relative}
.chart-wrap svg{display:block;width:100%;height:auto;overflow:visible}

/* gauges row */
.gauge-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:380px){.gauge-grid{grid-template-columns:1fr}}
.gauge-card{display:flex;flex-direction:column;align-items:center;text-align:center}
.gauge-vis{position:relative;width:150px;max-width:100%;margin:2px auto 0}
.gauge-vis svg{display:block;width:100%;height:auto}
.gauge-num{position:absolute;left:0;right:0;text-align:center;font-size:23px;font-weight:800;letter-spacing:-.6px;white-space:nowrap;line-height:1}
.gauge-vis.ring .gauge-num{top:50%;transform:translateY(-50%)}
.gauge-vis.semi .gauge-num{top:62%;transform:translateY(-50%)}
.gauge-cap{font-size:11.5px;color:var(--text-dim);font-weight:600;margin-top:8px}
.gauge-tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;margin-top:8px;letter-spacing:.3px}

/* upcoming expenses list */
.exp-list{display:flex;flex-direction:column;gap:2px}
.exp-item{display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;padding:9px 0;border-top:1px solid var(--line-soft)}
.exp-item:first-child{border-top:none}
.exp-when{width:48px;text-align:center}
.exp-when .ew-d{font-size:17px;font-weight:800;line-height:1}
.exp-when .ew-m{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-faint);letter-spacing:.5px}
.exp-mid{min-width:0}
.exp-note{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-bar{height:5px;border-radius:3px;background:var(--surface-3);margin-top:6px;overflow:hidden}
.exp-bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--neg-dim),var(--neg));width:0}
.exp-eta{font-size:11px;color:var(--text-faint);font-weight:600;margin-top:3px}
.exp-amt{font-size:15px;font-weight:800;color:var(--neg);font-variant-numeric:tabular-nums}

/* timeline */
.timeline{position:relative;margin-top:6px;padding:18px 4px 6px}
.tl-track{position:relative;height:3px;background:var(--surface-3);border-radius:2px}
.tl-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--pos),var(--blue));border-radius:2px}
.tl-today{position:absolute;top:-7px;width:2px;height:17px;background:var(--text);border-radius:2px}
.tl-today::after{content:"now";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-dim);font-weight:700}
.tl-pin{position:absolute;top:-5px;transform:translateX(-50%)}
.tl-pin .dot{width:11px;height:11px;border-radius:50%;background:var(--neg);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--neg)}
.tl-pin .dot.big{width:15px;height:15px}
.tl-labels{display:flex;justify-content:space-between;margin-top:14px;font-size:10.5px;color:var(--text-faint);font-weight:600}
.tl-legend{font-size:11.5px;color:var(--text-dim);margin-top:12px;line-height:1.5}

.empty-card{text-align:center;padding:26px 16px;color:var(--text-dim)}
.empty-card .ic{font-size:30px;margin-bottom:8px}
.empty-card .t{font-weight:700;color:var(--text);margin-bottom:4px}
.empty-card .d{font-size:13px}

/* ============== Calendar / Sheets ============== */
.overlay{
  position:fixed;inset:0;z-index:60;background:rgba(4,8,12,.6);
  backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .22s;
  display:flex;align-items:flex-end;justify-content:center;
}
.overlay.open{opacity:1;pointer-events:auto}
.sheet{
  width:100%;max-width:var(--maxw);background:var(--bg-soft);
  border-top-left-radius:24px;border-top-right-radius:24px;
  border:1px solid var(--line);border-bottom:none;
  padding:10px 16px calc(20px + var(--safe-b));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);
  max-height:88vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.5);
}
.overlay.open .sheet{transform:translateY(0)}
.grabber{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 12px}
.sheet-title{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sheet-title .x{width:34px;height:34px;border-radius:10px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-dim)}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-mtitle{font-size:16px;font-weight:800}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-dim)}
.cal-nav button:active{transform:scale(.9)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dow span{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-faint);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid transparent;position:relative;font-weight:700;font-size:14px;
  color:var(--text);transition:transform .1s;
}
.cal-cell.empty{background:transparent}
.cal-cell:active{transform:scale(.9)}
.cal-cell.other{color:var(--text-faint);background:transparent}
.cal-cell.today{border-color:var(--pos);color:var(--pos)}
.cal-cell.sel{background:linear-gradient(140deg,var(--pos),#2f8efc);color:#06131a;font-weight:800}
.cal-cell .marks{position:absolute;bottom:5px;display:flex;gap:3px}
.cal-cell .marks i{width:4px;height:4px;border-radius:50%}
.cal-cell.sel .marks i{filter:brightness(.6)}
.cal-jump{display:flex;gap:8px;margin-top:14px}
.cal-jump button{flex:1;padding:11px;border-radius:12px;background:var(--surface);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--text-dim)}
.cal-jump button.primary{background:linear-gradient(120deg,var(--pos),#2f8efc);color:#06131a}

/* settings */
.set-group{margin-bottom:18px}
.set-group h4{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);margin:0 0 8px}
.set-btn{
  width:100%;display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;
  background:var(--surface);border:1px solid var(--line);margin-bottom:9px;text-align:left;
  transition:transform .1s,background .15s;
}
.set-btn:active{transform:scale(.985);background:var(--surface-2)}
.set-btn .si{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--surface-2);flex-shrink:0}
.set-btn .si svg{width:19px;height:19px}
.set-btn .st{flex:1}
.set-btn .st .t{font-weight:700;font-size:14.5px}
.set-btn .st .d{font-size:12px;color:var(--text-dim);margin-top:1px}
.set-btn.danger .si{background:rgba(255,122,114,.12);color:var(--neg)}
.set-btn.danger .st .t{color:var(--neg)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--line);margin-bottom:9px}
.set-row .st .t{font-weight:700;font-size:14.5px}
.set-row .st .d{font-size:12px;color:var(--text-dim)}
.set-row select{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-weight:700;color:var(--text)}
.switch{width:52px;height:30px;border-radius:30px;background:var(--surface-3);border:1px solid var(--line);position:relative;transition:background .2s}
.switch.on{background:var(--pos)}
.switch i{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .2s}
.switch.on i{transform:translateX(22px)}
.set-meta{font-size:11.5px;color:var(--text-faint);text-align:center;margin-top:6px}

/* ============== Spreadsheet view ============== */
.ss-wrap{margin-top:6px}
.ss-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.ss-toolbar .ss-add{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:13px;background:linear-gradient(120deg,var(--pos),#2f8efc);color:#06131a;font-weight:800;font-size:14px}
.ss-toolbar .ss-add:active{transform:scale(.98)}
.ss-count{font-size:12px;color:var(--text-faint);font-weight:600}
.ss-table{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
.ss-headrow{display:grid;grid-template-columns:78px 1fr 1fr 1fr 24px;gap:0;background:var(--surface-2);border-bottom:1px solid var(--line)}
.ss-headrow span{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text-faint);padding:9px 8px;text-align:right}
.ss-headrow span:first-child{text-align:left}
.ss-row{border-bottom:1px solid var(--line-soft)}
.ss-row:last-child{border-bottom:none}
.ss-main{display:grid;grid-template-columns:78px 1fr 1fr 1fr 24px;align-items:center}
.ss-date{font-size:11.5px;font-weight:700;padding:0 8px;color:var(--text-dim)}
.ss-date small{display:block;font-size:9px;color:var(--text-faint);font-weight:600}
.ss-cell input{width:100%;border:none;background:transparent;text-align:right;padding:11px 8px;font-size:13.5px;font-weight:700;outline:none;font-variant-numeric:tabular-nums}
.ss-cell.bank input{color:var(--text)}
.ss-cell.inc input{color:var(--pos)}
.ss-cell.exp input{color:var(--neg)}
.ss-cell input:focus{background:var(--surface-2)}
.ss-del{display:grid;place-items:center;color:var(--text-faint);height:100%}
.ss-note{border-top:1px dashed var(--line-soft)}
.ss-note input{width:100%;border:none;background:transparent;padding:8px 10px;font-size:12.5px;color:var(--text-dim);outline:none}
.ss-note input::placeholder{color:var(--text-faint)}
.ss-empty{text-align:center;padding:30px;color:var(--text-faint)}

/* ============== Recurring rules ============== */
.rec-add{
  width:100%;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:13px;border-radius:13px;background:linear-gradient(120deg,var(--pos),#2f8efc);
  color:#06131a;font-weight:800;font-size:14px;margin-bottom:14px;
}
.rec-add:active{transform:scale(.98)}
.rec-add svg{width:18px;height:18px}
.rec-list{display:flex;flex-direction:column;gap:9px}
.rec-card{
  width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:12px 13px;display:flex;align-items:center;gap:12px;
  transition:transform .1s,background .15s;
}
.rec-card:active{transform:scale(.985);background:var(--surface-2)}
.rec-card.off{opacity:.5}
.rec-ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.rec-ic.income{background:rgba(61,220,151,.14);color:var(--pos)}
.rec-ic.expense{background:rgba(255,122,114,.14);color:var(--neg)}
.rec-info{flex:1;min-width:0}
.rec-name{font-weight:700;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-meta{font-size:12px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-amt{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;flex-shrink:0;text-align:right;white-space:nowrap}
.rec-amt.income{color:var(--pos)}
.rec-amt.expense{color:var(--neg)}
.rec-amt small{display:block;font-size:10px;color:var(--text-faint);font-weight:600;margin-top:1px}
.rec-empty{text-align:center;padding:26px 16px;color:var(--text-dim)}
.rec-empty .ic{font-size:30px;margin-bottom:8px}
.rec-empty .t{font-weight:700;color:var(--text);margin-bottom:4px}
.rec-empty .d{font-size:13px}
.rec-intro{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin:-4px 0 14px}
/* rule form */
.rec-form{display:flex;flex-direction:column;gap:14px}
.rf-row{display:flex;flex-direction:column;gap:6px}
.rf-row label{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--text-faint)}
.rf-row input,.rf-row select{
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:12px;font-weight:600;color:var(--text);width:100%;outline:none;
}
.rf-row input:focus,.rf-row select:focus{border-color:var(--accent)}
.rf-two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rf-hint{font-size:12px;color:var(--text-faint);font-weight:600}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{padding:11px;border-radius:9px;font-weight:700;font-size:13.5px;color:var(--text-dim);transition:background .15s,color .15s}
.seg button.on.income{background:rgba(61,220,151,.16);color:var(--pos)}
.seg button.on.expense{background:rgba(255,122,114,.16);color:var(--neg)}
.rf-active{display:flex;align-items:center;justify-content:space-between;padding:13px;border-radius:12px;background:var(--surface);border:1px solid var(--line)}
.rf-active .t{font-weight:700;font-size:14px}
.rf-active .d{font-size:12px;color:var(--text-dim);margin-top:1px}
.rf-actions{display:flex;gap:10px;margin-top:2px}
.rf-actions button{flex:1;padding:13px;border-radius:13px;font-weight:800;font-size:14px}
.rf-save{background:linear-gradient(120deg,var(--pos),#2f8efc);color:#06131a}
.rf-cancel{background:var(--surface);border:1px solid var(--line);color:var(--text-dim)}
.rf-del{width:100%;margin-top:2px;padding:13px;border-radius:13px;font-weight:800;font-size:14px;background:rgba(255,122,114,.1);border:1px solid var(--neg-dim);color:var(--neg)}

/* recurring summary card (dashboard) */
.rsum{display:flex;flex-direction:column;gap:10px}
.rsum-net{display:flex;align-items:baseline;gap:8px}
.rsum-net .v{font-size:23px;font-weight:800;letter-spacing:-.5px}
.rsum-net .v.pos{color:var(--pos)} .rsum-net .v.neg{color:var(--neg)}
.rsum-net .u{font-size:12px;color:var(--text-faint);font-weight:600}
.rsum-split{display:flex;gap:18px;flex-wrap:wrap}
.rsum-split .k{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text-faint)}
.rsum-split .s{font-size:14.5px;font-weight:800;font-variant-numeric:tabular-nums}
.rsum-split .s.pos{color:var(--pos)} .rsum-split .s.neg{color:var(--neg)}
.rsum-manage{margin-top:2px;align-self:flex-start;display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--text)}
.rsum-manage:active{transform:scale(.97)}
.rsum-manage svg{width:14px;height:14px}
.exp-tag{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);background:rgba(91,157,255,.14);padding:1px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}

/* ============== Forecast Timeline view ============== */
.view-head{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-top:6px;margin-bottom:14px;
  padding:14px;display:flex;align-items:center;justify-content:space-between;
}
.view-head .vh-title{font-weight:800;font-size:16px}
.view-head .vh-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.view-back{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--text);padding:8px 12px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line)}
.view-back:active{transform:scale(.96)}
.view-back svg{width:16px;height:16px}
.tl-range{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.tl-range button{padding:10px;border-radius:9px;font-weight:700;font-size:13.5px;color:var(--text-dim);transition:background .15s,color .15s}
.tl-range button.on{background:rgba(61,220,151,.16);color:var(--pos)}
.tl-chips{display:flex;gap:9px;overflow-x:auto;padding:1px 0 12px;-webkit-overflow-scrolling:touch}
.tl-chip{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:9px 13px;min-width:96px}
.tl-chip .k{font-size:10px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.tl-chip .v{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-top:2px}
.tl-chip .s{font-size:10.5px;color:var(--text-faint);font-weight:600;margin-top:1px}
.tl-chip .v.pos{color:var(--pos)} .tl-chip .v.neg{color:var(--neg)} .tl-chip .v.gold{color:var(--gold)}
.tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);padding:8px 0}
.tl-scroll svg{display:block}

/* ============== Forecast Calendar view ============== */
.cal-view .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-view .cal-mtitle{font-size:16px;font-weight:800}
.cal-view .cal-nav{display:flex;gap:8px}
.cal-view .cal-nav button{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-dim)}
.cal-view .cal-nav button:active{transform:scale(.9)}
.cal-view .cal-nav svg{width:16px;height:16px}
.cal-view .cal-grid{gap:3px}
.cal-view .cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:4px 5px;border-radius:10px}
.cal-view .cal-cell.empty{background:transparent}
.cal-view .cal-cell .day{font-size:10px;color:var(--text-faint);font-weight:700;line-height:1}
.cal-view .cal-cell.today .day{color:var(--pos)}
.cal-view .cal-cell .bal{font-size:10.5px;font-weight:800;margin-top:auto;font-variant-numeric:tabular-nums;line-height:1.1}
.cal-view .cal-cell .marks{position:static;margin-top:3px}
.cal-view .cal-bal-normal{background:var(--surface)}
.cal-view .cal-bal-low{background:rgba(245,196,81,.13)}
.cal-view .cal-bal-low .bal{color:var(--gold)}
.cal-view .cal-bal-danger{background:rgba(255,122,114,.15)}
.cal-view .cal-bal-danger .bal{color:var(--neg)}
.cal-view .cal-bal-negative{background:rgba(255,122,114,.30)}
.cal-view .cal-bal-negative .bal{color:var(--neg)}
.cal-view .cal-bal-none{opacity:.4}
.cal-view .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--pos)}
.cal-view .cal-cell.sel{box-shadow:inset 0 0 0 2px var(--blue)}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.cal-legend .li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);font-weight:600}
.cal-legend .sw{width:14px;height:14px;border-radius:5px;border:1px solid var(--line)}

/* toast */
.toast{
  position:fixed;left:50%;bottom:calc(24px + var(--safe-b));
  transform:translateX(-50%) translateY(20px);
  background:var(--surface-3);border:1px solid var(--line);color:var(--text);
  padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:90;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:var(--shadow);
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--neg-dim)}

.hidden{display:none !important}
.tabular{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">₵</div>
      <div class="name">Cash<span>Cast</span></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="navTimeline" aria-label="Forecast timeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>

<!-- anime.js for motion -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script>
"use strict";
/* ============================================================
   1. CONSTANTS
   ============================================================ */
const APP_VERSION = 2;
const STORAGE_KEY = "cashcast.v1";
const ROLL_DAYS = 28;
const RECUR_HORIZON = 730;            // max days a rule is expanded into the forecast
const TL_LEAD_DAYS = 7;               // timeline: actual history shown before today
const TL_PX_PER_DAY = 14;            // timeline: horizontal px scale per day
const CAL_BANDS = { dangerDays:7, lowDays:21 }; // calendar status thresholds, in days-of-outflow
const CADENCE_UNITS = ["day","week","month","year"];
const ORDINALS = ["th","st","nd","rd"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CURRENCIES = { USD:"$", EUR:"€", GBP:"£", JPY:"¥", CAD:"C$", AUD:"A$", INR:"₹", BRL:"R$", MXN:"MX$", CHF:"Fr", ZAR:"R" };
const HAS_ANIME = typeof window.anime === "function";

/* ============================================================
   2. DATE HELPERS  (all dates are local-midnight, ISO YYYY-MM-DD)
   ============================================================ */
const pad = n => String(n).padStart(2,"0");
function iso(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function todayISO(){ return iso(new Date()); }
function addDays(s,n){ const d=parseISO(s); d.setDate(d.getDate()+n); return iso(d); }
function addMonths(s,n){ const d=parseISO(s); d.setMonth(d.getMonth()+n); return iso(d); }
function startOfMonth(s){ const d=parseISO(s); return iso(new Date(d.getFullYear(),d.getMonth(),1)); }
function endOfMonth(s){ const d=parseISO(s); return iso(new Date(d.getFullYear(),d.getMonth()+1,0)); }
function daysInMonth(year,month){ return new Date(year,month+1,0).getDate(); }
function startOfWeek(s){ // Monday-based
  const d=parseISO(s); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return iso(d);
}
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function dowOf(s){ return parseISO(s).getDay(); }
function fmtDayLong(s){ const d=parseISO(s); return `${DOW[d.getDay()]}, ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`; }
function fmtDaySub(s){ const d=parseISO(s); return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }
function isWithin(s, start, end){ return s>=start && s<=end; }

/* ============================================================
   3. STORAGE ADAPTER
   ============================================================ */
const Storage = {
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      const data = JSON.parse(raw);
      if(!data || typeof data!=="object") return null;
      return data;
    }catch(e){ console.warn("load failed",e); return null; }
  },
  save(state){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: APP_VERSION,
        records: state.records,
        recurring: state.recurring,
        settings: state.settings
      }));
    }catch(e){ console.warn("save failed",e); toast("Could not save — storage full?", true); }
  }
};

/* ============================================================
   4. STATE STORE  (persisted: records,settings ; volatile: ui)
   ============================================================ */
function defaultState(){
  return {
    version: APP_VERSION,
    records: {},               // { "YYYY-MM-DD": {date,bank,income,expense,note} }
    recurring: [],             // [ {id,type,amount,cadence:{unit,interval},startDate,endDate,category,note,active} ]
    settings: { currency:"USD", useRollingIncome:true },
    ui: { selectedDate: todayISO(), view:"dashboard", openPanel:null, calMonth: startOfMonth(todayISO()), recEdit:null,
          tlRange: 30, calViewMonth: startOfMonth(todayISO()) }
  };
}
const store = {
  state: defaultState(),
  listeners: [],
  subscribe(fn){ this.listeners.push(fn); },
  emit(){ this.listeners.forEach(fn=>fn()); },
  persist(){ Storage.save(this.state); }
};

function hydrate(){
  const saved = Storage.load();
  if(saved){
    store.state.records = saved.records && typeof saved.records==="object" ? saved.records : {};
    store.state.recurring = Array.isArray(saved.recurring) ? saved.recurring.map(sanitizeRule).filter(Boolean) : [];
    store.state.settings = Object.assign({currency:"USD", useRollingIncome:true}, saved.settings||{});
  }
}

/* ============================================================
   5. DOMAIN MODEL + VALIDATION
   ============================================================ */
function blankRecord(date){ return { date, bank:null, income:0, expense:0, note:"" }; }
function getRecord(date){ return store.state.records[date] || blankRecord(date); }
function sortedDates(){ return Object.keys(store.state.records).sort(); }

function num(v){ // coerce user input to number or 0
  if(v===null||v===undefined||v==="") return 0;
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,""));
  return Number.isFinite(n) ? n : 0;
}
function bankNum(v){ // bank can be null
  if(v===null||v===undefined||String(v).trim()==="") return null;
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,""));
  return Number.isFinite(n) ? n : null;
}

// ---- recurring rules ----
function genId(){ return "r"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function blankRule(){
  return { id:genId(), type:"expense", amount:0, cadence:{unit:"month",interval:1},
    startDate:todayISO(), endDate:null, category:"", note:"", active:true };
}
// validate / coerce an arbitrary object into a clean rule, or null if unusable
function sanitizeRule(r){
  if(!r || typeof r!=="object") return null;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(r.startDate||"")) return null;
  const unit = CADENCE_UNITS.includes(r.cadence&&r.cadence.unit) ? r.cadence.unit : "month";
  let interval = Math.round(num((r.cadence&&r.cadence.interval)||1));
  if(!(interval>=1)) interval = 1;
  const amount = Math.max(0, num(r.amount));
  const end = /^\d{4}-\d{2}-\d{2}$/.test(r.endDate||"") ? r.endDate : null;
  return {
    id: typeof r.id==="string" && r.id ? r.id : genId(),
    type: r.type==="income" ? "income" : "expense",
    amount,
    cadence: { unit, interval },
    startDate: r.startDate,
    endDate: end,
    category: typeof r.category==="string" ? r.category.slice(0,40) : "",
    note: typeof r.note==="string" ? r.note.slice(0,140) : "",
    active: r.active!==false
  };
}

/* ============================================================
   6. ACTIONS  (mutate state -> persist -> emit)
   ============================================================ */
const actions = {
  // low-level write: mutate the record + persist, no rendering
  writeField(date, field, rawValue){
    const rec = Object.assign(blankRecord(date), store.state.records[date]);
    if(field==="bank") rec.bank = bankNum(rawValue);
    else if(field==="note") rec.note = String(rawValue).slice(0,140);
    else rec[field] = Math.max(0, num(rawValue)); // income/expense non-negative
    // drop fully-empty records to keep store clean
    if(rec.bank===null && !rec.income && !rec.expense && !rec.note.trim()){
      delete store.state.records[date];
    } else {
      rec.date = date;
      store.state.records[date] = rec;
    }
    store.persist();
  },
  // commit a field edit WITHOUT tearing down the inputs / top controls, so that
  // tapping another element in the same gesture keeps the keyboard up and lets
  // that element's own action fire on the same tap.
  commitField(date, field, rawValue){
    this.writeField(date, field, rawValue);
    if(store.state.ui.view==="dashboard") refreshDerived();
  },
  selectDate(date){
    store.state.ui.selectedDate = date;
    store.state.ui.calMonth = startOfMonth(date);
    store.state.ui.openPanel = null;
    store.emit();
  },
  togglePanel(name){
    store.state.ui.openPanel = store.state.ui.openPanel===name ? null : name;
    store.emit();
  },
  setView(view){ store.state.ui.view = view; store.state.ui.openPanel=null; store.emit(); },
  setCurrency(code){ store.state.settings.currency = code; store.persist(); store.emit(); },
  setUseRollingIncome(on){ store.state.settings.useRollingIncome = !!on; store.persist(); store.emit(); },
  // recurring rules
  saveRule(rule){
    const clean = sanitizeRule(rule);
    if(!clean) throw new Error("Invalid rule");
    const idx = store.state.recurring.findIndex(r=>r.id===clean.id);
    if(idx>=0) store.state.recurring[idx] = clean;
    else store.state.recurring.push(clean);
    store.persist(); store.emit();
  },
  deleteRule(id){ store.state.recurring = store.state.recurring.filter(r=>r.id!==id); store.persist(); store.emit(); },
  toggleRule(id){
    const r = store.state.recurring.find(x=>x.id===id);
    if(r){ r.active = !r.active; store.persist(); store.emit(); }
  },
  deleteRecord(date){ delete store.state.records[date]; store.persist(); store.emit(); },
  clearAll(){ store.state.records = {}; store.persist(); store.emit(); },
  importData(obj){
    // validate at boundary
    if(!obj || typeof obj!=="object") throw new Error("Not a valid CashCast file");
    const src = obj.records && typeof obj.records==="object" ? obj.records : obj;
    const clean = {};
    let count=0;
    for(const key of Object.keys(src)){
      if(!/^\d{4}-\d{2}-\d{2}$/.test(key)) continue;
      const r = src[key]||{};
      clean[key] = {
        date: key,
        bank: (r.bank===null||r.bank===undefined||r.bank==="") ? null : (Number.isFinite(+r.bank)?+r.bank:null),
        income: Number.isFinite(+r.income)?Math.max(0,+r.income):0,
        expense: Number.isFinite(+r.expense)?Math.max(0,+r.expense):0,
        note: typeof r.note==="string" ? r.note.slice(0,140) : ""
      };
      count++;
    }
    store.state.records = clean;
    if(Array.isArray(obj.recurring))
      store.state.recurring = obj.recurring.map(sanitizeRule).filter(Boolean);
    if(obj.settings && obj.settings.currency && CURRENCIES[obj.settings.currency])
      store.state.settings.currency = obj.settings.currency;
    if(obj.settings && typeof obj.settings.useRollingIncome==="boolean")
      store.state.settings.useRollingIncome = obj.settings.useRollingIncome;
    store.persist(); store.emit();
    return count;
  }
};

/* ============================================================
   7. DERIVED SELECTORS  (pure calculations over records)
   ============================================================ */
function fmtMoney(n, opts={}){
  const cur = store.state.settings.currency || "USD";
  const sym = CURRENCIES[cur] || "$";
  const neg = n<0;
  let v = Math.abs(n);
  const dec = (opts.cents===false) ? 0 : (v>=10000?0:2);
  let str = v.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return (neg?"-":"")+sym+str;
}
function fmtSigned(n){ return (n>=0?"+":"-")+fmtMoney(Math.abs(n)); }

// most recent bank value on or before a date
function latestBankEntry(onOrBefore){
  let best=null;
  for(const date of sortedDates()){
    if(date>onOrBefore) break;
    const r = store.state.records[date];
    if(r && r.bank!==null && r.bank!==undefined) best = {date, bank:r.bank};
  }
  return best;
}
// rolling daily income average over the ROLL_DAYS ending at endDate
function rollingDailyIncome(endDate){
  const start = addDays(endDate, -(ROLL_DAYS-1));
  let sum=0;
  for(const date of sortedDates()){
    if(date<start) continue;
    if(date>endDate) break;
    sum += store.state.records[date].income||0;
  }
  return sum / ROLL_DAYS;
}
function sumIncome(start,end){
  let s=0;
  for(const date of sortedDates()){ if(date<start) continue; if(date>end) break; s+=store.state.records[date].income||0; }
  return s;
}
function sumExpense(start,end){
  let s=0;
  for(const date of sortedDates()){ if(date<start) continue; if(date>end) break; s+=store.state.records[date].expense||0; }
  return s;
}
function weekToDate(date){ return sumIncome(startOfWeek(date), date); }
function monthToDate(date){ return sumIncome(startOfMonth(date), date); }
function monthExpenses(date){ return sumExpense(startOfMonth(date), endOfMonth(date)); }

/* ---- recurring rule expansion (never written to records) ---- */
function ordinal(n){ const v=n%100; return n+(ORDINALS[(v-20)%10]||ORDINALS[v]||ORDINALS[0]); }
// clamp a desired day-of-month to the days actually available that month
function effectiveDom(year, month, desiredDay){ return Math.min(desiredDay, daysInMonth(year,month)); }

// does a single rule fire on the given ISO date?  Anchored to the rule's start date.
function ruleOccursOn(rule, date){
  if(!rule.active) return false;
  if(date < rule.startDate) return false;
  if(rule.endDate && date > rule.endDate) return false;
  const n = Math.max(1, rule.cadence.interval||1);
  const start = parseISO(rule.startDate);
  const d = parseISO(date);
  switch(rule.cadence.unit){
    case "day":  { const diff=daysBetween(rule.startDate,date); return diff>=0 && diff%n===0; }
    case "week": { const diff=daysBetween(rule.startDate,date); return diff>=0 && diff%(7*n)===0; }
    case "month":{
      if(d.getDate()!==effectiveDom(d.getFullYear(),d.getMonth(),start.getDate())) return false;
      const months=(d.getFullYear()-start.getFullYear())*12+(d.getMonth()-start.getMonth());
      return months>=0 && months%n===0;
    }
    case "year": {
      if(d.getMonth()!==start.getMonth()) return false;
      if(d.getDate()!==effectiveDom(d.getFullYear(),d.getMonth(),start.getDate())) return false;
      const years=d.getFullYear()-start.getFullYear();
      return years>=0 && years%n===0;
    }
  }
  return false;
}
// aggregate every active rule that fires on a date -> {income,expense,items:[{rule,amount,type}]}
function recurringOnDate(date){
  const out={income:0, expense:0, items:[]};
  for(const rule of store.state.recurring){
    if(ruleOccursOn(rule, date)){
      out[rule.type] += rule.amount;
      out.items.push({rule, amount:rule.amount, type:rule.type});
    }
  }
  return out;
}
// human label for a rule's cadence, e.g. "Every other Fri", "Monthly on the 1st"
function cadenceLabel(rule){
  const n = Math.max(1, rule.cadence.interval||1);
  const start = parseISO(rule.startDate);
  switch(rule.cadence.unit){
    case "day":   return n===1 ? "Daily" : `Every ${n} days`;
    case "week":  { const wd=DOW[start.getDay()];
      return n===1 ? `Weekly on ${wd}` : n===2 ? `Every other ${wd}` : `Every ${n} weeks on ${wd}`; }
    case "month": { const dom=ordinal(start.getDate());
      return n===1 ? `Monthly on the ${dom}` : `Every ${n} months on the ${dom}`; }
    case "year":  { const md=`${MONTHS_SHORT[start.getMonth()]} ${start.getDate()}`;
      return n===1 ? `Yearly on ${md}` : `Every ${n} years on ${md}`; }
  }
  return "";
}
// approximate average occurrences per 30-day month, for the dashboard summary
function ruleMonthlyAmount(rule){
  const n = Math.max(1, rule.cadence.interval||1);
  const per = { day:30/n, week:(365/7/12)/n, month:1/n, year:(1/12)/n }[rule.cadence.unit] || 0;
  return rule.amount * per;
}
function activeRules(){ return store.state.recurring.filter(r=>r.active); }

// project daily balances from anchor through endDate (inclusive of full range)
function projectSeries(startDate, endDate){
  const today = todayISO();
  const daily = rollingDailyIncome(today);
  const useRolling = store.state.settings.useRollingIncome!==false;
  const hasRules = store.state.recurring.length>0;
  // anchor = latest bank on or before max(startDate, today's known) — we walk from anchor
  const anchor = latestBankEntry(today) || latestBankEntry(endDate);
  const series = [];
  if(!anchor){ return { series:[], daily, anchor:null }; }
  // walk range: from min(startDate, anchor.date) ... but display from startDate
  let walkStart = anchor.date < startDate ? anchor.date : startDate;
  // if anchor after startDate we just begin at anchor
  if(anchor.date > startDate) walkStart = anchor.date;
  let balance = null;
  let cur = walkStart;
  while(cur <= endDate){
    const r = store.state.records[cur];
    const isPast = cur <= today;
    // recurring rules only project forward; past days use real records, never synthetic entries
    const rec = (!isPast && hasRules) ? recurringOnDate(cur) : {income:0,expense:0};
    const dayExpense = (r?r.expense||0:0) + rec.expense;
    if(balance===null){
      balance = (r && r.bank!==null && r.bank!==undefined) ? r.bank : anchor.bank;
    } else {
      const inc = isPast ? (r? (r.income||0):0) : ((useRolling?daily:0) + rec.income);
      balance = balance + inc - dayExpense;
      if(isPast && r && r.bank!==null && r.bank!==undefined) balance = r.bank; // honor real correction
    }
    if(cur >= startDate){
      series.push({ date:cur, balance, projected: cur>today, expense:dayExpense, note:(r?r.note:"") });
    }
    cur = addDays(cur,1);
  }
  return { series, daily, anchor };
}
function forecastEndOfMonth(date){
  const eom = endOfMonth(date);
  const { series, anchor, daily } = projectSeries(startOfMonth(date), eom);
  const last = series.length ? series[series.length-1] : null;
  return { value: last? last.balance : (anchor?anchor.bank:0), anchor, daily, eom, series };
}
// upcoming known expenses after today
function upcomingExpenses(fromDate, days=90){
  const end = addDays(fromDate, days);
  const out=[];
  // recorded one-off expenses
  for(const date of sortedDates()){
    if(date<=fromDate) continue;
    if(date>end) break;
    const r=store.state.records[date];
    if(r.expense>0) out.push({date, amount:r.expense, note:r.note, recurring:false});
  }
  // projected recurring expenses (not stored in records)
  if(store.state.recurring.length){
    let cur=addDays(fromDate,1);
    while(cur<=end){
      for(const it of recurringOnDate(cur).items){
        if(it.type==="expense")
          out.push({date:cur, amount:it.amount, note:it.rule.note||it.rule.category||"Recurring", recurring:true});
      }
      cur=addDays(cur,1);
    }
  }
  out.sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : 0);
  return out;
}
// income pace: actual income this month vs expected (daily avg * days elapsed)
function incomePace(date){
  const today = todayISO();
  const monthStart = startOfMonth(date), monthEnd = endOfMonth(date);
  // current month measures up to today; past/future months measure the whole month
  const refDay = (today >= monthStart && today <= monthEnd) ? today : monthEnd;
  const elapsed = daysBetween(monthStart, refDay) + 1;
  const daily = rollingDailyIncome(today);
  const expected = daily * elapsed;
  const actual = sumIncome(monthStart, refDay);
  const ratio = expected>0 ? actual/expected : (actual>0?1.5:1);
  return { actual, expected, ratio, daily, elapsed };
}

/* ============================================================
   8. MOTION HELPERS
   ============================================================ */
function animateNumber(el, to, formatter){
  const from = parseFloat(el.dataset.val||"0")||0;
  el.dataset.val = to;
  if(from===to){ el.textContent = formatter(to); return; }
  if(!HAS_ANIME){ el.textContent = formatter(to); return; }
  const obj = {v:from};
  anime({ targets:obj, v:to, duration:650, easing:"easeOutCubic",
    update:()=> el.textContent = formatter(obj.v) });
}
function expand(el){
  if(!el) return;
  const h = el.firstElementChild ? el.firstElementChild.offsetHeight : el.scrollHeight;
  if(!HAS_ANIME){ el.style.height="auto"; return; }
  anime.remove(el);
  anime({ targets:el, height:[el.offsetHeight,h], duration:340, easing:"easeOutCubic",
    complete:()=>{ el.style.height="auto"; } });
}
function collapse(el){
  if(!el) return;
  if(!HAS_ANIME){ el.style.height="0px"; return; }
  anime.remove(el);
  anime({ targets:el, height:[el.offsetHeight,0], duration:280, easing:"easeInCubic" });
}
function pop(el){
  if(!HAS_ANIME||!el) return;
  anime({ targets:el, scale:[.97,1], opacity:[.4,1], duration:380, easing:"easeOutCubic" });
}
function staggerIn(els){
  if(!HAS_ANIME||!els.length) return;
  anime({ targets:els, translateY:[10,0], opacity:[0,1], delay:anime.stagger(28), duration:380, easing:"easeOutCubic" });
}

/* ============================================================
   9. SVG / CHART BUILDERS
   ============================================================ */
function el(tag, attrs={}, children=[]){
  const ns = "http://www.w3.org/2000/svg";
  const e = document.createElementNS(ns, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  (Array.isArray(children)?children:[children]).forEach(c=>{ if(c) e.appendChild(c); });
  return e;
}
function pathLen(el){ return (el && typeof el.getTotalLength==="function") ? el.getTotalLength() : 0; }
function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}; }
function arcPath(cx,cy,r,startDeg,endDeg){
  const s=polar(cx,cy,r,endDeg), e=polar(cx,cy,r,startDeg);
  const large = (endDeg-startDeg)<=180?0:1;
  return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 0 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
}

// Projected balance line/area chart
function balanceChart(series, animate=true){
  const W=320,H=170,padL=6,padR=6,padT=14,padB=24;

  if(series.length<2){
    const wrap=document.createElement("div"); wrap.className="chart-wrap";

    return wrap;
  }
  const vals = series.map(p=>p.balance);
  let min = Math.min(...vals, 0), max = Math.max(...vals, 0);
  if(min===max){ max=min+100; }
  const range = max-min || 1;
  const n = series.length;
  const x = i => padL + (i/(n-1))*(W-padL-padR);
  const y = v => padT + (1-(v-min)/range)*(H-padT-padB);

  if(actualPts.length>1){
    let d=`M ${x(0)} ${y(actualPts[0].balance)}`;
    actualPts.forEach((p,i)=> d+=` L ${x(i)} ${y(p.balance)}`);
    d+=` L ${x(actualPts.length-1)} ${H-padB} L ${x(0)} ${H-padB} Z`;
    svg.appendChild(el("path",{d,fill:"url(#areaG)"}));
  }
  // actual line
  let da="";
  for(let i=0;i<Math.min(splitIdx+1,n);i++){ da+=(i===0?"M":"L")+` ${x(i)} ${y(series[i].balance)} `; }
  if(da) svg.appendChild(el("path",{d:da,fill:"none",stroke:"#3ddc97","stroke-width":2.4,"stroke-linejoin":"round","stroke-linecap":"round"}));
  // projected line (dashed)
  if(splitIdx<n){
    let dp="";
    const startP = Math.max(splitIdx-1,0);
    for(let i=startP;i<n;i++){ dp+=(i===startP?"M":"L")+` ${x(i)} ${y(series[i].balance)} `; }

  }
  // expense markers

  }});
  // today marker
  if(splitIdx>0 && splitIdx<=n){

    svg.appendChild(el("circle",{cx:tx,cy:y(series[ti].balance),r:4,fill:"#e8eef5",stroke:"#161d27","stroke-width":2}));
  }

  // axis date labels (first, today-ish, last)
  const lbl=(i,t)=> svg.appendChild(el("text",{x:Math.max(padL+10,Math.min(x(i),W-padR-12)),y:H-7,fill:"#6c7c8c","font-size":"8.5","font-weight":"600","text-anchor":"middle"},[txt(t)]));
  lbl(0, MONTHS_SHORT[parseISO(series[0].date).getMonth()]+" "+parseISO(series[0].date).getDate());

  const wrap=document.createElement("div"); wrap.className="chart-wrap"; wrap.appendChild(svg);
  // animate draw — line-draw the solid actual path, fade in the dashed forecast + dots
  if(animate && HAS_ANIME){
    const actual = svg.querySelector("path[stroke='#3ddc97'][fill='none']");
    const len = pathLen(actual);
    if(actual && len){ actual.style.strokeDasharray=len; actual.style.strokeDashoffset=len;
      anime({targets:actual,strokeDashoffset:[len,0],duration:900,easing:"easeOutCubic"}); }
    const proj = svg.querySelector("path[stroke='#f5c451']");
    if(proj){ anime({targets:proj,opacity:[0,1],duration:600,delay:500,easing:"easeOutCubic"}); }
    anime({targets:svg.querySelectorAll("circle"),opacity:[0,1],delay:anime.stagger(25,{start:400}),duration:400,easing:"easeOutCubic"});
  }
  return wrap;
}

    const anchor = px < 46 ? "start" : px > W-46 ? "end" : "middle";
    svg.appendChild(el("text",{x:px,y:ly,fill:col,"font-size":"8.5","font-weight":"700","text-anchor":anchor},[txt(lbl)]));
    const dt=parseISO(pin.date);
    svg.appendChild(el("text",{x:px,y:above?ly+9:ly+10,fill:"#6c7c8c","font-size":"8","font-weight":"600","text-anchor":anchor},[txt(MONTHS_SHORT[dt.getMonth()]+" "+dt.getDate())]));
  });
  // endpoint
  const last=series[n-1];
  svg.appendChild(el("circle",{cx:x(n-1),cy:y(last.balance),r:4,fill:last.balance<0?"#ff7a72":"#f5c451",stroke:"#161d27","stroke-width":2}));

  const wrap=document.createElement("div"); wrap.className="chart-wrap"; wrap.appendChild(svg);
  if(animate && HAS_ANIME){
    const actual=svg.querySelector("path[stroke='#3ddc97'][fill='none']"); const len=pathLen(actual);
    if(actual && len){ actual.style.strokeDasharray=len; actual.style.strokeDashoffset=len;
      anime({targets:actual,strokeDashoffset:[len,0],duration:900,easing:"easeOutCubic"}); }
    const proj=svg.querySelector("path[stroke='#f5c451']");
    if(proj){ anime({targets:proj,opacity:[0,1],duration:600,delay:400,easing:"easeOutCubic"}); }
    anime({targets:svg.querySelectorAll("circle"),opacity:[0,1],delay:anime.stagger(18,{start:300}),duration:400,easing:"easeOutCubic"});
  }
  return wrap;
}

// semicircle gauge (0..2 ratio, 1 = on pace)
function paceGauge(ratio, animate=true){
  const W=150,H=96,cx=75,cy=84,r=62;
  const clamped = Math.max(0, Math.min(2, ratio));
  const pct = clamped/2; // 0..1 across 180deg
  const endDeg = -90 + pct*180;
  const svg=el("svg",{viewBox:`0 0 ${W} ${H}`});
  svg.appendChild(el("path",{d:arcPath(cx,cy,r,-90,90),fill:"none",stroke:"#212d3b","stroke-width":11,"stroke-linecap":"round"}));
  // color by ratio
  let col = ratio>=0.95 ? "#3ddc97" : ratio>=0.7 ? "#f5c451" : "#ff7a72";
  const fg = el("path",{d:arcPath(cx,cy,r,-90,endDeg),fill:"none",stroke:col,"stroke-width":11,"stroke-linecap":"round"});
  svg.appendChild(fg);
  // 'on pace' tick at center (ratio 1 -> 0deg)
  const tick = polar(cx,cy,r+8,0);
  const tickIn = polar(cx,cy,r-8,0);
  svg.appendChild(el("line",{x1:tickIn.x,y1:tickIn.y,x2:tick.x,y2:tick.y,stroke:"#6c7c8c","stroke-width":1.5}));
  if(animate && HAS_ANIME){
    const len=pathLen(fg);
    if(len){ fg.style.strokeDasharray=len; fg.style.strokeDashoffset=len;
      anime({targets:fg,strokeDashoffset:[len,0],duration:900,easing:"easeOutCubic"}); }
  }
  return svg;
}
// radial ring gauge (value vs reference for EOM forecast)
function ringGauge(pct, color, animate=true){
  const W=150,H=150,cx=75,cy=75,r=60;
  const c=2*Math.PI*r;
  const p=Math.max(0,Math.min(1,pct));
  const svg=el("svg",{viewBox:`0 0 ${W} ${H}`});
  svg.appendChild(el("circle",{cx,cy,r,fill:"none",stroke:"#212d3b","stroke-width":11}));
  const fg=el("circle",{cx,cy,r,fill:"none",stroke:color,"stroke-width":11,"stroke-linecap":"round",transform:`rotate(-90 ${cx} ${cy})`,"stroke-dasharray":c,"stroke-dashoffset":c*(1-p)});
  svg.appendChild(fg);
  if(animate && HAS_ANIME){ fg.style.strokeDashoffset=c; anime({targets:fg,strokeDashoffset:[c,c*(1-p)],duration:1000,easing:"easeOutCubic"}); }
  return svg;
}

/* ============================================================
   10. DOM HELPERS
   ============================================================ */
function h(tag, attrs={}, kids=[]){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(k==="value") e.value=attrs[k];
    else if(attrs[k]!==null&&attrs[k]!==undefined) e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(kids)?kids:[kids]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}
function $(sel,root=document){ return root.querySelector(sel); }
function $$(sel,root=document){ return [...root.querySelectorAll(sel)]; }

let toastTimer;
function toast(msg, isErr=false){
  const t=$("#toast"); t.textContent=msg; t.className="toast show"+(isErr?" err":"");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className="toast"+(isErr?" err":""),2600);
}

// Lightweight in-place refresh after a field commit: updates derived metrics &
// visualizations without tearing down the ribbon inputs or top controls, so the
// element tapped in the same gesture keeps working and the keyboard stays up.

  if(store.state.ui.view!=="dashboard") return;
  const sel = store.state.ui.selectedDate;
  const eomVal = forecastEndOfMonth(sel).value;
  setMetric("wtd", weekToDate(sel), fmtMoney);
  setMetric("mtd", monthToDate(sel), fmtMoney);

function computeRunway(){
  const today = todayISO();
  const { series } = projectSeries(today, addDays(today,90));
  for(const p of series){ if(p.balance<0) return Math.max(0, daysBetween(today,p.date)); }
  return null;
}

/* ---- Forecast Timeline derivation ---- */
// projected series with a short actual lead-in before today, for the timeline view
function timelineData(){
  const today = todayISO();
  const range = store.state.ui.tlRange || 30;
  const start = addDays(today, -TL_LEAD_DAYS);
  const end   = addDays(today, range);
  const proj  = projectSeries(start, end);   // {series, daily, anchor}
  return Object.assign({ today, range, start, end }, proj);
}
// notable points to pin on the curve, de-duped by priority per date
function timelinePins(series){
  const today = todayISO();
  const idxOf = {}; series.forEach((p,i)=>{ idxOf[p.date]=i; });
  const prio = { low:6, payday:5, bill:4, eom:3, expense:2, eow:1 };
  const byDate = {}; // date -> chosen pin
  const consider = (date, kind, amount, label)=>{
    const i = idxOf[date]; if(i===undefined) return;
    const cur = byDate[date];
    if(!cur || prio[kind] > prio[cur.kind])
      byDate[date] = { date, idx:i, balance:series[i].balance, kind, amount:amount||0, label:label||"" };
  };
  for(const p of series){
    if(!p.projected) continue;                 // only annotate the forecast portion
    const rec = store.state.recurring.length ? recurringOnDate(p.date) : {income:0,expense:0,items:[]};
    rec.items.forEach(it=>{
      if(it.type==="income") consider(p.date,"payday",it.amount, it.rule.note||it.rule.category||"Payday");
      else consider(p.date,"bill",it.amount, it.rule.note||it.rule.category||"Bill");
    });
    const rod = store.state.records[p.date];
    if(rod && rod.expense>0) consider(p.date,"expense",rod.expense, rod.note||"Expense");
    if(dowOf(p.date)===0) consider(p.date,"eow",0,"End of week");
    if(p.date===endOfMonth(p.date)) consider(p.date,"eom",0,"End of "+MONTHS_SHORT[parseISO(p.date).getMonth()]);
  }
  // lowest projected balance (single pin)
  const fut = series.filter(p=>p.projected);
  if(fut.length){
    let lo = fut[0];
    for(const p of fut) if(p.balance < lo.balance) lo = p;
    consider(lo.date,"low",0,"Lowest");
  }
  return Object.keys(byDate).map(k=>byDate[k]).sort((a,b)=>a.idx-b.idx);
}
// the five glance chips above the curve
function timelineChips(data){
  const { series, today } = data;
  const at = d => { const p = series.find(x=>x.date===d); return p?p.balance:null; };
  const todayBal = at(today) ?? (latestBankEntry(today)||{bank:0}).bank;
  const fut = series.filter(p=>p.projected);
  // next payday
  let payday=null;
  for(const p of fut){ if(recurringOnDate(p.date).income>0){ payday=p; break; } }
  // next bill (recurring or one-off recorded)
  let bill=null;
  for(const p of fut){ const rod=store.state.records[p.date];
    if(recurringOnDate(p.date).expense>0 || (rod&&rod.expense>0)){ bill=p; break; } }
  // lowest
  let low=null; for(const p of fut){ if(!low||p.balance<low.balance) low=p; }
  const eom = forecastEndOfMonth(today).value;
  return [
    { k:"Today", v:todayBal, s:fmtDayLong(today), tone:todayBal<0?"neg":"" },
    { k:"Next payday", v:payday?payday.balance:null, s:payday?fmtDayLong(payday.date):"none scheduled", tone:"pos" },
    { k:"After next bill", v:bill?bill.balance:null, s:bill?fmtDayLong(bill.date):"none scheduled", tone:bill&&bill.balance<0?"neg":"" },
    { k:"Lowest", v:low?low.balance:null, s:low?fmtDayLong(low.date):"—", tone:low&&low.balance<0?"neg":"gold" },
    { k:"End of month", v:eom, s:"forecast", tone:eom<0?"neg":"gold" }
  ];
}

// average daily recurring outflow (>=1), used to scale day-status thresholds
function dailyOutflowBase(){
  const exp = activeRules().filter(r=>r.type==="expense").reduce((s,r)=>s+ruleMonthlyAmount(r),0) / 30;
  return Math.max(exp, 1);
}
// status band for a projected balance: none|negative|danger|low|normal
function statusForBalance(bal){
  if(bal===null || bal===undefined) return "none";
  if(bal<0) return "negative";
  const d = dailyOutflowBase();
  if(bal < d*CAL_BANDS.dangerDays) return "danger";
  if(bal < d*CAL_BANDS.lowDays)    return "low";
  return "normal";
}
// month of projected balances via one projectSeries call, indexed by date
function calendarViewData(monthISO){
  const som = startOfMonth(monthISO), eom = endOfMonth(monthISO);
  const { series, anchor } = projectSeries(som, eom);
  const byDate = new Map(series.map(p=>[p.date, p]));
  return { som, eom, byDate, anchor };
}

  }
  // income first, then expense; within each by amount desc
  const ordered=[...rules].sort((a,b)=> (a.type===b.type ? b.amount-a.amount : (a.type==="income"?-1:1)));
  const list=h("div",{class:"rec-list"});
  ordered.forEach(r=>{
    const next=nextOccurrence(r);
    const sub=cadenceLabel(r)+(r.active?(next?" · next "+fmtDayLong(next):" · ended"):" · paused");
    list.appendChild(h("button",{class:"rec-card"+(r.active?"":" off"),onClick:()=>{ store.state.ui.recEdit={...r,cadence:{...r.cadence}}; renderRecurring(); }},[
      h("div",{class:"rec-ic "+r.type}, r.type==="income"?"↑":"↓"),
      h("div",{class:"rec-info"},[
        h("div",{class:"rec-name"}, r.note||r.category||(r.type==="income"?"Income":"Expense")),
        h("div",{class:"rec-meta"}, sub)
      ]),
      h("div",{class:"rec-amt "+r.type},[ (r.type==="income"?"+":"−")+fmtMoney(r.amount,{cents:false}).replace("-",""),
        r.category? h("small",{}, r.category):null ])
    ]));
  });
  wrap.appendChild(list);
  return wrap;
}
// first occurrence strictly on/after today within the horizon (null if none)
function nextOccurrence(rule){
  const today=todayISO();
  let cur = rule.startDate>today ? rule.startDate : today;
  const limit = addDays(today, RECUR_HORIZON);
  while(cur<=limit){
    if(ruleOccursOn(rule,cur)) return cur;
    if(rule.endDate && cur>rule.endDate) return null;
    cur=addDays(cur,1);
  }
  return null;
}

function recForm(d){
  const form=h("div",{class:"rec-form"});
  // type
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Type"),
    h("div",{class:"seg"},[
      h("button",{class:"income"+(d.type==="income"?" on":""),onClick:()=>{ d.type="income"; renderRecurring(); }},"Income"),
      h("button",{class:"expense"+(d.type==="expense"?" on":""),onClick:()=>{ d.type="expense"; renderRecurring(); }},"Expense")
    ])
  ]));
  // amount
  const sym=CURRENCIES[store.state.settings.currency]||"$";
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{}, "Amount ("+sym+")"),
    h("input",{type:"text",inputmode:"decimal",value:d.amount||"",placeholder:"0.00",
      onInput:e=>{ d.amount=num(e.target.value); }, onFocus:e=>e.target.select()})
  ]));
  // cadence: interval + unit
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Repeats every"),
    h("div",{class:"rf-two"},[
      h("input",{type:"number",min:"1",step:"1",value:d.cadence.interval||1,
        onInput:e=>{ const v=Math.round(num(e.target.value)); d.cadence.interval=v>=1?v:1; }}),
      h("select",{onChange:e=>{ d.cadence.unit=e.target.value; renderRecurring(); }},
        CADENCE_UNITS.map(u=>h("option",{value:u,selected:u===d.cadence.unit?"selected":null},
          u.charAt(0).toUpperCase()+u.slice(1)+"(s)")))
    ]),
    h("div",{class:"rf-hint"}, cadenceLabel(d))
  ]));
  // start / end dates
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Starts on"),
    h("input",{type:"date",value:d.startDate||todayISO(),
      onInput:e=>{ if(e.target.value) d.startDate=e.target.value; renderRecurring(); }})
  ]));
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Ends on (optional)"),
    h("input",{type:"date",value:d.endDate||"",
      onInput:e=>{ d.endDate=e.target.value||null; }})
  ]));
  // category + note
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Category (optional)"),
    h("input",{type:"text",value:d.category||"",placeholder:"e.g. Housing, Salary",maxlength:40,
      onInput:e=>{ d.category=e.target.value; }})
  ]));
  form.appendChild(h("div",{class:"rf-row"},[
    h("label",{},"Label / note"),
    h("input",{type:"text",value:d.note||"",placeholder:"e.g. Rent, Paycheck, Netflix",maxlength:140,
      onInput:e=>{ d.note=e.target.value; }})
  ]));
  // active toggle
  form.appendChild(h("div",{class:"rf-active"},[
    h("div",{},[ h("div",{class:"t"},"Active"), h("div",{class:"d"},"Include this item in the forecast") ]),
    h("button",{class:"switch"+(d.active?" on":""),onClick:()=>{ d.active=!d.active; renderRecurring(); }},[ h("i") ])
  ]));
  // actions
  form.appendChild(h("div",{class:"rf-actions"},[
    h("button",{class:"rf-cancel",onClick:()=>{ store.state.ui.recEdit=null; renderRecurring(); }},"Cancel"),
    h("button",{class:"rf-save",onClick:recSave},"Save")
  ]));
  if(isStoredRule(d.id))
    form.appendChild(h("button",{class:"rf-del",onClick:()=>recDelete(d.id)},"Delete this rule"));
  return form;
}
function recSave(){
  const d=store.state.ui.recEdit; if(!d) return;
  if(!(d.amount>0)){ toast("Enter an amount greater than 0", true); return; }
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d.startDate||"")){ toast("Pick a start date", true); return; }
  if(d.endDate && d.endDate<d.startDate){ toast("End date is before the start date", true); return; }
  store.state.ui.recEdit=null;
  try{ actions.saveRule(d); toast("Recurring item saved"); }
  catch(e){ store.state.ui.recEdit=d; toast("Could not save: "+e.message, true); renderRecurring(); }
}
function recDelete(id){
  if(!confirm("Delete this recurring rule?")) return;
  store.state.ui.recEdit=null;
  actions.deleteRule(id);
  toast("Rule deleted");
}

/* ============================================================
   13. SETTINGS
   ============================================================ */
function openSettings(){ renderSettings(); $("#setOverlay").classList.add("open"); }
function closeSettings(){ $("#setOverlay").classList.remove("open"); }
function renderSettings(){
  const body=$("#setBody"); body.innerHTML="";
  const recCount=sortedDates().length;
  const ssOn = store.state.ui.view==="spreadsheet";

  // data group
  const g1=h("div",{class:"set-group"},[
    h("h4",{},"Your data"),
    setBtn("📤","#3ddc97","Export JSON","Download a backup of all records", exportData),
    setBtn("📥","#5b9dff","Import JSON","Restore or merge from a backup file", ()=>$("#importFile").click())
  ]);
  body.appendChild(g1);

  // planning group
  const activeCount=activeRules().length;
  const g0=h("div",{class:"set-group"},[
    h("h4",{},"Planning"),
    setBtn("🔁","#5b9dff","Recurring income & expenses",
      activeCount? `${activeCount} active rule${activeCount===1?"":"s"} projected onto your forecast` : "Add paychecks, rent, subscriptions & bills",
      openRecurring)
  ]);
  body.appendChild(g0);

  // view group
  const g2=h("div",{class:"set-group"},[ h("h4",{},"View") ]);
  const ssRow=h("div",{class:"set-row"},[
    h("div",{class:"st"},[ h("div",{class:"t"},"Spreadsheet View"), h("div",{class:"d"},"Fast raw editing of every date") ]),
    h("button",{class:"switch"+(ssOn?" on":""),onClick:()=>{ actions.setView(ssOn?"dashboard":"spreadsheet"); closeSettings(); }},[ h("i") ])
  ]);
  g2.appendChild(ssRow);
  const curRow=h("div",{class:"set-row"},[
    h("div",{class:"st"},[ h("div",{class:"t"},"Currency"), h("div",{class:"d"},"Display symbol & formatting") ]),
    h("select",{onChange:e=>actions.setCurrency(e.target.value)},
      Object.keys(CURRENCIES).map(c=>h("option",{value:c,selected:c===store.state.settings.currency?"selected":null}, `${c} ${CURRENCIES[c]}`)))
  ]);
  g2.appendChild(curRow);
  body.appendChild(g2);

  // forecast group
  const rollOn = store.state.settings.useRollingIncome!==false;
  const g4=h("div",{class:"set-group"},[
    h("h4",{},"Forecast"),
    h("div",{class:"set-row"},[
      h("div",{class:"st"},[ h("div",{class:"t"},"Rolling income average"),
        h("div",{class:"d"},"Project everyday income from your recent history. Turn off if your income is fully covered by recurring rules.") ]),
      h("button",{class:"switch"+(rollOn?" on":""),onClick:()=>actions.setUseRollingIncome(!rollOn)},[ h("i") ])
    ])
  ]);
  body.appendChild(g4);

  // danger
  const g3=h("div",{class:"set-group"},[
    h("h4",{},"Danger zone"),
    setBtn("🗑️",null,"Clear all data","Permanently delete every record", clearAllData, true)
  ]);
  body.appendChild(g3);

  body.appendChild(h("div",{class:"set-meta"}, `CashCast v${APP_VERSION} · ${recCount} record${recCount===1?"":"s"} · stored locally on this device`));
}
function setBtn(emoji,color,title,desc,onClick,danger){
  return h("button",{class:"set-btn"+(danger?" danger":""),onClick},[
    h("div",{class:"si",style:color?`background:${color}22;color:${color}`:""}, emoji),
    h("div",{class:"st"},[ h("div",{class:"t"},title), h("div",{class:"d"},desc) ])
  ]);
}
function exportData(){
  const payload={ app:"CashCast", version:APP_VERSION, exportedAt:new Date().toISOString(),
    settings:store.state.settings, records:store.state.records, recurring:store.state.recurring };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`cashcast-${todayISO()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Exported backup");
}
function clearAllData(){
  if(!confirm("Delete ALL records permanently? Export a backup first if unsure.")) return;
  actions.clearAll(); closeSettings(); toast("All data cleared");
}
function handleImport(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      const n=actions.importData(obj);
      closeSettings(); toast(`Imported ${n} record${n===1?"":"s"}`);
    }catch(e){ toast("Import failed: "+e.message, true); }
  };
  reader.onerror=()=>toast("Could not read file", true);
  reader.readAsText(file);
}

/* ============================================================
   14. INIT
   ============================================================ */
function bindGlobal(){
  $("#navTimeline").addEventListener("click", ()=>actions.setView(store.state.ui.view==="timeline"?"dashboard":"timeline"));
  $("#navCalendar").addEventListener("click", ()=>actions.setView(store.state.ui.view==="calendar"?"dashboard":"calendar"));
  $(".brand").addEventListener("click", ()=>actions.setView("dashboard"));
  $("#settingsBtn").addEventListener("click", openSettings);
  $("#setClose").addEventListener("click", closeSettings);
  $("#setOverlay").addEventListener("click", e=>{ if(e.target.id==="setOverlay") closeSettings(); });
  $("#recClose").addEventListener("click", closeRecurring);
  $("#recOverlay").addEventListener("click", e=>{ if(e.target.id==="recOverlay") closeRecurring(); });
  $("#calOverlay").addEventListener("click", e=>{ if(e.target.id==="calOverlay") closeCalendar(); });
  $("#calPrev").addEventListener("click", ()=>{ store.state.ui.calMonth=addMonths(store.state.ui.calMonth,-1); renderCalendar(); });
  $("#calNext").addEventListener("click", ()=>{ store.state.ui.calMonth=addMonths(store.state.ui.calMonth,1); renderCalendar(); });
  $("#calPrevYear").addEventListener("click", ()=>{ store.state.ui.calMonth=addMonths(store.state.ui.calMonth,-12); renderCalendar(); });
  $("#calNextYear").addEventListener("click", ()=>{ store.state.ui.calMonth=addMonths(store.state.ui.calMonth,12); renderCalendar(); });
  $("#calToday").addEventListener("click", ()=>{ store.state.ui.calMonth=startOfMonth(todayISO()); renderCalendar(); });
  $("#importFile").addEventListener("change", e=>{ if(e.target.files[0]) handleImport(e.target.files[0]); e.target.value=""; });
}

function init(){
  hydrate();
  bindGlobal();
  // re-render on every state change; keep calendar/settings live if open
  store.subscribe(()=>{
    render();
    if($("#calOverlay").classList.contains("open")) renderCalendar();
    if($("#setOverlay").classList.contains("open")) renderSettings();
    if($("#recOverlay").classList.contains("open")) renderRecurring();
  });
  render();
}
document.addEventListener("DOMContentLoaded", init);
</script>
